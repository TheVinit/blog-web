<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura | Premium Blogging Platform</title>

  <!-- SEO Meta Tags -->
  <meta name="description"
    content="Share your ideas, read stories, and connect with a community of premium creators on Aura.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
    rel="stylesheet">

  <!-- Google Material Symbols Rounded -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

  <!-- Navigation Bar -->
  <header class="navbar">
    <div class="nav-container">
      <a href="#/" class="nav-logo" id="nav-logo">
        <span class="logo-accent">A</span>ura
      </a>

      <nav class="nav-links" id="nav-links">
        <!-- Links will be dynamically populated/manipulated based on auth state -->
        <a href="#/" class="nav-link active" data-route="feed">
          <span class="material-symbols-rounded">feed</span> Feed
        </a>
        <a href="#/write" class="nav-link auth-only" data-route="write">
          <span class="material-symbols-rounded">edit_square</span> Write
        </a>
        <a href="#/profile" class="nav-link auth-only" data-route="profile">
          <span class="material-symbols-rounded">account_circle</span> Profile
        </a>
        <a href="#/auth" class="nav-btn guest-only" id="auth-btn">
          <span class="material-symbols-rounded">login</span> Sign In
        </a>
      </nav>

      <div class="nav-controls">
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
          <span class="material-symbols-rounded" id="theme-icon">light_mode</span>
        </button>
        <button id="menu-toggle" class="icon-btn mobile-only" aria-label="Toggle Menu">
          <span class="material-symbols-rounded">menu</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content Container -->
  <main id="app">
    <!-- Dynamic views will render here -->
    <div class="global-loader">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- Global Toast Notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Javascript Modules -->
  <script type="module" src="/js/api.js"></script>
  <script type="module" src="/js/store.js"></script>
  <script type="module" src="/js/router.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>

</html>
